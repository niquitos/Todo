services:
  db:
    image: postgres:15
    container_name: agileboard-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agileboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./src/backend/AgileBoard
      dockerfile: Dockerfile
    container_name: agileboard-backend
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Database=agileboard;Username=postgres;Password=postgres
    depends_on:
      - db

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: agileboard-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
