version: '3.8'

services:
  backend:
    build:
      context: ./src/backend/AgileBoard
      dockerfile: Dockerfile
    volumes:
      - ./src/backend/AgileBoard:/app
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5000
